[pytest]
testpaths = tests
python_files = test_*.py test-*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    multithread: marks tests as multithread recompute tests
    fuzz: marks tests as long-running fuzz tests (deselect with '-m "not fuzz"')
